<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CraftinfQZ</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="./styles.css" rel="stylesheet"/>
<script src="./app.js" defer></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#f49d25', // Custom orange from THEME_3
            charcoal: '#0a0a0a',
            panel: '#151515',
            input: '#1f1f1f',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
</head>
<body class="nui-backdrop min-h-screen flex items-center justify-center p-6" style="display: none;">
<div class="tablet-shell">
<div class="tablet-screen bg-charcoal text-gray-200 font-sans h-full overflow-hidden flex flex-col selection:bg-brand selection:text-white">
<!-- BEGIN: Header -->
<header class="p-6 flex justify-between items-center z-10">
<div class="flex items-baseline gap-2">
<h1 class="text-4xl font-black tracking-tighter italic text-white uppercase">CRAFTINF<span class="text-brand">QZ</span></h1>
</div>
<button class="text-xs uppercase tracking-widest text-gray-400 hover:text-brand transition-colors flex items-center gap-2" id="close-button" type="button">
      Fechar Menu <span class="bg-red-600 text-white p-1 rounded-sm text-[10px] font-bold px-2">ESC</span>
</button>
</header>
<!-- END: Header -->
<main class="flex-1 flex px-8 pb-8 gap-6 overflow-hidden min-h-0 items-stretch">
<!-- BEGIN: Left Sidebar (Items List) -->
<aside class="w-80 flex flex-col gap-4 min-h-0" data-purpose="items-sidebar">
<div class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">
        Itens que você pode <span class="text-brand">Produzir</span>
</div>
<!-- Search Bar -->
<div class="relative">
<input class="w-full bg-input border-none rounded-md py-3 px-4 text-sm focus:ring-1 focus:ring-brand placeholder-gray-600 transition-all" id="search-input" placeholder="Buscar item pelo nome..." type="text"/>
<svg class="w-4 h-4 absolute right-4 top-3.5 text-gray-600" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<!-- Items List -->
<div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3" id="items-list">
</div>
</aside>
<!-- END: Left Sidebar -->
<!-- BEGIN: Central Focus Area -->
<section class="flex-1 flex flex-col items-center justify-center relative radial-gradient-bg min-h-0" data-purpose="crafting-workbench">
<!-- Item Preview -->
<div class="text-center mt-6">
<h2 class="text-3xl font-black text-white uppercase tracking-tighter mb-1" id="craft-item-name">Bandagem</h2>
<p class="text-brand font-semibold text-xs uppercase tracking-widest opacity-80" id="craft-item-category">Consumíveis</p>
</div>
<div class="relative w-64 h-64 flex items-center justify-center my-6">
<!-- Glow Rings -->
<div class="absolute inset-0 border border-brand/10 rounded-full scale-110"></div>
<div class="absolute inset-0 border-2 border-brand/20 rounded-full scale-90"></div>
<div class="absolute inset-0 border-4 border-brand/5 rounded-full scale-125"></div>
<!-- Main Icon Container -->
<div class="relative z-10 w-52 h-52 bg-brand/10 rounded-full flex items-center justify-center border-4 border-brand/30 orange-glow">
<div class="w-36 h-36 rounded-full overflow-hidden item-art-fade">
<img alt="Selected Item Large" class="w-full h-full object-cover" id="craft-item-image" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB9kJnS5NE7j-NJDDYG-0N7F4CIJHjXyGAndre5rnLQJVdavKXus3onhn1GlzJ3kSC8QVaG14b1aYiXyQdKVD4VGBjemK8HFIjbDeGnmlXXXL55HYCejvveNZhdHUfIpgpThlGCFSyqQOeqSyY9jxI6e3ik5fZfoczVoETYVyTmz1jop023ILaycpJp2TG5J6ZK_CzZnYkYOPclhNltMDSralWLf0j-9rT9bLJE8JTKN6xl7mx2OTzDJcRmlRIxAjEpduX9_RlobBhl"/>
</div>
<div class="absolute -bottom-4 bg-brand/20 px-4 py-1 rounded-full border border-brand/40 backdrop-blur-md">
<span class="text-brand text-xs font-bold" id="craft-item-xp">+10 XP</span>
</div>
</div>
</div>
<!-- Crafting Controls -->
<div class="flex flex-col items-center gap-5 w-full max-w-xs">
<div class="flex items-center gap-2 bg-panel/80 p-1 rounded-md border border-white/10">
<button class="w-10 h-10 flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 rounded text-brand font-bold" id="qty-minus" type="button">-</button>
<input class="w-16 bg-transparent border-none text-center text-lg font-bold focus:ring-0 text-white" id="craft-quantity" type="text" value="1"/>
<button class="w-10 h-10 flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 rounded text-brand font-bold" id="qty-plus" type="button">+</button>
</div>
<button class="group w-full bg-brand hover:bg-[#e08a1d] text-black font-black py-3 rounded-md uppercase tracking-[0.2em] shadow-lg shadow-brand/20 transition-all active:scale-95 flex items-center justify-center gap-3" id="craft-button">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
          Produzir Item
        </button>
</div>
</section>
<!-- END: Central Focus Area -->
<!-- BEGIN: Right Side Panels -->
<aside class="w-80 flex flex-col gap-6 min-h-0" data-purpose="info-panels">
<!-- User Profile -->
<section class="bg-panel rounded-lg p-5 flex items-center gap-4 border border-white/5 shadow-xl" data-purpose="user-profile">
<div class="flex-1 text-right">
<h3 class="text-sm font-bold text-white" id="player-name">Devnitro Devsda</h3>
<div class="text-[11px] font-bold text-brand uppercase tracking-wider" id="player-group">Grupo: Nenhum</div>
</div>
</section>
<!-- Requirements Section -->
<section class="flex-1 flex flex-col gap-3" data-purpose="crafting-requirements">
<div class="text-[11px] font-bold uppercase tracking-widest text-center border-b border-white/5 pb-2">
          Itens necessários para <span class="text-brand">Produzir</span>
</div>
<div class="bg-panel/40 rounded-lg p-4 flex flex-col gap-2 border border-white/5 overflow-y-auto" id="requirements-list">
<div class="text-[10px] font-bold text-zinc-700 uppercase tracking-widest text-center py-8" id="requirements-empty">Selecione um item</div>
</div>
</section>
<section class="flex-1 flex flex-col gap-3 min-h-0" data-purpose="production-history">
<div class="text-[11px] font-bold uppercase tracking-widest text-center border-b border-white/5 pb-2">
          Histórico de <span class="text-brand">Produção</span>
</div>
<div class="bg-panel/40 rounded-lg p-4 flex flex-col gap-2 border border-white/5 overflow-y-auto custom-scrollbar" id="production-history-list">
<div class="text-[10px] font-bold text-zinc-700 uppercase tracking-widest text-center py-8" id="production-history-empty">Sem produções ainda</div>
</div>
</section>
</aside>
<!-- END: Right Side Panels -->
</main>
<!-- Footer Decor -->
<footer class="h-1 bg-zinc-900 w-full relative">
<div class="absolute inset-0 bg-brand w-1/3"></div>
</footer>
</div>
</div>
</body></html>
